name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OS deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends sqlite3

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[api,embeddings,embeddings_fast,extract,clustering,reranker,viz]'
          pip install pytest pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check memoirs scripts tests || true   # warn-only for now

      - name: Run unit tests
        env:
          MEMOIRS_CURATOR_ENABLED: 'off'      # no GGUF in CI; heuristic only
          MEMOIRS_GEMMA_CURATOR: 'off'
          MEMOIRS_GRAPH_LLM: 'off'
        run: |
          pytest tests/ -q \
            -k "not slow and not perf and not throughput and not bench and not benchmark and not dance and not mcp_server and not cli_current_smoke and not cli_resume_explicit" \
            --maxfail=10 \
            --timeout=60 || pytest tests/ -q \
            -k "not slow and not perf and not throughput and not bench and not benchmark and not dance and not mcp_server and not cli_current_smoke and not cli_resume_explicit" \
            --maxfail=10

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build dist
        run: python -m build

      - name: Verify dist with twine
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  bench-smoke:
    name: synthetic bench smoke (memoirs only)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[api,embeddings_fast]'

      - name: Run head-to-head bench (memoirs only — no rivals in CI)
        env:
          MEMOIRS_CURATOR_ENABLED: 'off'
          MEMOIRS_PRF: 'on'
        run: |
          python scripts/bench_vs_others.py \
            --engines memoirs --top-k 10 \
            --out bench_ci.json --md-out bench_ci.md \
            --quiet
          cat bench_ci.md

      - uses: actions/upload-artifact@v4
        with:
          name: bench-ci
          path: |
            bench_ci.json
            bench_ci.md

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Memoirs" }} · memoirs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css">
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root { --font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        html { font-family: var(--font); }
        body { font-family: var(--font); -webkit-font-smoothing: antialiased; }
        .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; line-height: 18px; letter-spacing: 0.01em; }
        .pill-preference  { background:#eef2ff; color:#4338ca; }
        .pill-fact         { background:#ecfeff; color:#0e7490; }
        .pill-project      { background:#fef3c7; color:#92400e; }
        .pill-task         { background:#fef9c3; color:#854d0e; }
        .pill-decision     { background:#dcfce7; color:#166534; }
        .pill-style        { background:#fae8ff; color:#86198f; }
        .pill-credential_pointer { background:#fee2e2; color:#991b1b; }
        .pill-procedural   { background:#e0e7ff; color:#3730a3; }
        .pill-tool_call    { background:#f5f5f4; color:#44403c; }
        .stat-card { background: linear-gradient(135deg, #fff 0%, #fafbfc 100%); border:1px solid #e5e7eb; border-radius:12px; padding:18px 20px; }
        .stat-num  { font-size: 28px; font-weight: 600; color:#111827; line-height:1.1; }
        .stat-label{ font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color:#6b7280; font-weight: 600; }
        .stat-help { font-size: 12px; color:#9ca3af; margin-top:4px; }
        .nav-link  { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:#475569; font-size:14px; transition: background .12s, color .12s; }
        .nav-link:hover { background:#f1f5f9; color:#0f172a; }
        .nav-link.active { background:#0f172a; color:#fff; }
        .nav-link i { font-size:16px; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; }
        .card-header { padding:14px 20px; border-bottom:1px solid #f1f5f9; }
        .card-body { padding:18px 20px; }
        details > summary { list-style:none; cursor:pointer; }
        details > summary::-webkit-details-marker { display:none; }
        /* Form controls: explicit colors so dark UA defaults don't bleed in. */
        input[type="text"], input[type="search"], input[type="date"],
        input[type="number"], input[type="email"], select, textarea {
            background-color: #ffffff;
            color: #0f172a;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="search"]:focus, input[type="date"]:focus,
        input[type="number"]:focus, input[type="email"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0f172a;
            box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.15);
        }
        input::placeholder, textarea::placeholder { color: #94a3b8; }
        select option { background-color: #ffffff; color: #0f172a; }
        button { font-family: var(--font); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900">
<div class="min-h-screen flex">
    <aside class="w-60 bg-white border-r border-slate-200 p-4 flex flex-col gap-1">
        <a href="/" class="flex items-center gap-2 mb-5 px-1">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-slate-900 text-white">
                <i class="lucide lucide-brain"></i>
            </span>
            <span>
                <div class="text-base font-semibold text-slate-900 leading-none">memoirs</div>
                <div class="text-[11px] text-slate-400 mt-1">long-term memory engine</div>
            </span>
        </a>
        <nav class="flex flex-col gap-0.5">
            <a href="/"             class="nav-link"><i class="lucide lucide-layout-dashboard"></i>Dashboard</a>
            <a href="/ui/memories"  class="nav-link"><i class="lucide lucide-database"></i>Memories</a>
            <a href="/ui/search"    class="nav-link"><i class="lucide lucide-search"></i>Search</a>
            <a href="/ui/timeline"  class="nav-link"><i class="lucide lucide-line-chart"></i>Timeline</a>
            <a href="/ui/graph"     class="nav-link"><i class="lucide lucide-share-2"></i>Graph</a>
            <a href="/ui/conflicts" class="nav-link"><i class="lucide lucide-alert-triangle"></i>Conflicts</a>
            <a href="/ui/snapshots" class="nav-link"><i class="lucide lucide-camera"></i>Snapshots</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-slate-100 text-xs text-slate-400 px-2">
            <a href="/docs" class="hover:text-slate-700 flex items-center gap-1.5">
                <i class="lucide lucide-book-open text-[14px]"></i>API docs
            </a>
        </div>
    </aside>
    <main class="flex-1 p-8 max-w-7xl">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>

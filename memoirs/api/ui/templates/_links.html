{% if links %}
<ul class="text-sm divide-y divide-slate-100">
{% for l in links %}
    <li class="py-2 flex items-center gap-3">
        <span class="pill pill-{{ l.type }}">{{ l.type }}</span>
        <a class="flex-1 hover:underline text-slate-800" href="/ui/memories/{{ l.id }}">{{ l.summary }}</a>
        <span class="text-xs text-slate-500 tabular-nums">sim {{ "%.3f"|format(l.similarity or 0) }}</span>
        <span class="text-xs text-slate-400">d{{ l.depth }}</span>
        <span class="text-xs text-slate-400">{{ l.reason or "" }}</span>
    </li>
{% endfor %}
</ul>
{% else %}
<p class="text-xs text-slate-400">no Zettelkasten links yet (run <code>memoirs links rebuild</code>).</p>
{% endif %}

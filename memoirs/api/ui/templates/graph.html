{% extends "base.html" %}
{% block extra_head %}
<script src="https://unpkg.com/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
<style>
    #cy { width: 100%; height: 600px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; }
</style>
{% endblock %}
{% block content %}
<h2 class="text-2xl font-semibold mb-4">Memory graph</h2>

<form class="bg-white border border-slate-200 rounded p-3 flex flex-wrap gap-3 items-end mb-4"
      onsubmit="loadGraph(event)">
    <div class="flex-1 min-w-[260px]">
        <label class="block text-xs text-slate-500 mb-1">Seed memory id (optional)</label>
        <input id="g-seed" type="text" class="w-full border border-slate-300 rounded px-2 py-1 text-sm font-mono"
               placeholder="mem_…">
    </div>
    <div>
        <label class="block text-xs text-slate-500 mb-1">Depth</label>
        <input id="g-depth" type="number" min="1" max="3" value="2"
               class="w-20 border border-slate-300 rounded px-2 py-1 text-sm">
    </div>
    <div>
        <label class="block text-xs text-slate-500 mb-1">Limit (no seed)</label>
        <input id="g-limit" type="number" min="1" max="200" value="50"
               class="w-24 border border-slate-300 rounded px-2 py-1 text-sm">
    </div>
    <button class="bg-slate-900 hover:bg-slate-700 text-white text-sm px-3 py-1.5 rounded" type="submit">
        render
    </button>
</form>

<div id="cy"></div>
<p id="g-meta" class="text-xs text-slate-500 mt-2"></p>

<script>
let cy = null;
async function loadGraph(evt) {
    if (evt) evt.preventDefault();
    const seed = document.getElementById('g-seed').value.trim();
    const depth = document.getElementById('g-depth').value || 2;
    const limit = document.getElementById('g-limit').value || 50;
    const params = new URLSearchParams({ depth, limit });
    if (seed) params.set('seed', seed);
    const res = await fetch('/ui/graph?' + params.toString(), {
        headers: { 'Accept': 'application/json' },
    });
    const data = await res.json();
    document.getElementById('g-meta').textContent =
        `${data.nodes.length} nodes · ${data.edges.length} edges` +
        (data.error ? ' — ' + data.error : '');
    cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [...data.nodes, ...data.edges],
        layout: { name: 'cose', animate: false, padding: 20 },
        style: [
            { selector: 'node', style: {
                'label': 'data(label)',
                'background-color': '#64748b',
                'color': '#0f172a',
                'font-size': '10px',
                'text-wrap': 'wrap',
                'text-max-width': 120,
                'width': 22, 'height': 22,
            }},
            { selector: 'node[type = "preference"]',  style: { 'background-color': '#6366f1' }},
            { selector: 'node[type = "fact"]',         style: { 'background-color': '#06b6d4' }},
            { selector: 'node[type = "project"]',      style: { 'background-color': '#f59e0b' }},
            { selector: 'node[type = "task"]',         style: { 'background-color': '#eab308' }},
            { selector: 'node[type = "decision"]',     style: { 'background-color': '#22c55e' }},
            { selector: 'node[type = "style"]',        style: { 'background-color': '#d946ef' }},
            { selector: 'edge', style: {
                'curve-style': 'bezier', 'width': 'mapData(weight, 0, 1, 1, 4)',
                'line-color': '#cbd5e1', 'opacity': 0.7,
            }},
        ],
    });
    cy.on('tap', 'node', (e) => {
        const id = e.target.data('id');
        window.location = '/ui/memories/' + id;
    });
}
loadGraph();
</script>
{% endblock %}
